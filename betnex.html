<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BetNex - Premium Gaming</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --g1: #00e676;
            --g2: #00c853;
            --g3: #00a040;
            --gold: #d4a843;
            --gold-light: #f0cc6a;
            --bg: #0f1f15;
            --bg2: #162b1c;
            --bg3: #1c3524;
            --text: #e8f5e9;
            --text-muted: rgba(200,230,210,0.5);
            --border: rgba(0,230,118,0.2);
            --border-gold: rgba(212,168,67,0.35);
        }

        html, body {
            width: 100%; height: 100%; overflow: hidden;
            background: var(--bg);
            color: var(--text);
            font-family: 'Montserrat', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .iframe-wrap {
            position: fixed; inset: 0; z-index: 1;
            opacity: 0; transition: opacity 0.8s ease;
        }
        .iframe-wrap.show { opacity: 1; }
        iframe { width: 100%; height: 100%; border: none; }

        #loader {
            position: fixed; inset: 0; z-index: 9999;
            display: flex; align-items: center; justify-content: center;
            background: var(--bg);
            transition: opacity 0.9s cubic-bezier(0.4,0,0.2,1), visibility 0.9s;
        }
        #loader.out { opacity: 0; visibility: hidden; }

        /* ── Background ── */
        .bg-layer { position: absolute; inset: 0; overflow: hidden; }

        .bg-base {
            position: absolute; inset: 0;
            background:
                radial-gradient(ellipse 90% 70% at 50% -10%, rgba(0,180,80,0.28) 0%, transparent 55%),
                radial-gradient(ellipse 60% 50% at 90% 90%, rgba(0,150,60,0.15) 0%, transparent 50%),
                radial-gradient(ellipse 50% 60% at 10% 60%, rgba(0,120,50,0.12) 0%, transparent 50%),
                linear-gradient(160deg, #0f1f15 0%, #162b1c 50%, #111a13 100%);
        }

        .bg-conic {
            position: absolute;
            width: 1000px; height: 1000px;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: conic-gradient(
                from 0deg,
                transparent 0deg,
                rgba(0,230,118,0.04) 25deg,
                transparent 50deg,
                transparent 140deg,
                rgba(212,168,67,0.03) 165deg,
                transparent 190deg,
                transparent 310deg,
                rgba(0,230,118,0.04) 335deg,
                transparent 360deg
            );
            border-radius: 50%;
            animation: conicSpin 40s linear infinite;
        }
        @keyframes conicSpin { to { transform: translate(-50%,-50%) rotate(360deg); } }

        .bg-rays {
            position: absolute; inset: 0;
            background: repeating-conic-gradient(
                from 0deg at 50% 50%,
                rgba(0,220,100,0.018) 0deg,
                transparent 1deg,
                transparent 15deg
            );
            animation: conicSpin 80s linear infinite reverse;
        }

        .bg-lines {
            position: absolute; inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 79px,
                rgba(0,220,100,0.04) 80px
            );
        }

        .bg-vignette {
            position: absolute; inset: 0;
            background: radial-gradient(ellipse 100% 100% at 50% 50%, transparent 35%, rgba(8,14,10,0.7) 100%);
        }

        /* ── Ornamental border ── */
        .frame-border {
            position: absolute; inset: 20px;
            border: 1px solid rgba(212,168,67,0.18);
            border-radius: 2px; pointer-events: none;
        }
        .frame-border::before {
            content: ''; position: absolute; inset: 6px;
            border: 1px solid rgba(0,230,118,0.1);
            border-radius: 1px;
        }

        .orn { position: absolute; width: 28px; height: 28px; pointer-events: none; }
        .orn::before, .orn::after {
            content: ''; position: absolute;
            background: var(--gold); opacity: 0;
            animation: ornIn 0.5s ease forwards;
        }
        .orn-tl { top: 26px; left: 26px; }
        .orn-tr { top: 26px; right: 26px; }
        .orn-bl { bottom: 26px; left: 26px; }
        .orn-br { bottom: 26px; right: 26px; }
        .orn-tl::before { width: 28px; height: 1px; top: 0; left: 0; animation-delay: 0.8s; }
        .orn-tl::after  { width: 1px; height: 28px; top: 0; left: 0; animation-delay: 1s; }
        .orn-tr::before { width: 28px; height: 1px; top: 0; right: 0; animation-delay: 0.9s; }
        .orn-tr::after  { width: 1px; height: 28px; top: 0; right: 0; animation-delay: 1.1s; }
        .orn-bl::before { width: 28px; height: 1px; bottom: 0; left: 0; animation-delay: 1s; }
        .orn-bl::after  { width: 1px; height: 28px; bottom: 0; left: 0; animation-delay: 1.2s; }
        .orn-br::before { width: 28px; height: 1px; bottom: 0; right: 0; animation-delay: 1.1s; }
        .orn-br::after  { width: 1px; height: 28px; bottom: 0; right: 0; animation-delay: 1.3s; }
        @keyframes ornIn { to { opacity: 0.7; } }

        /* ── Content ── */
        .content {
            position: relative; z-index: 10;
            display: flex; flex-direction: column; align-items: center;
            width: 100%; max-width: 480px; padding: 2rem;
            text-align: center;
        }

        /* ── Logo ── */
        .logo-mark {
            position: relative; width: 100px; height: 100px;
            margin: 0 auto 2.5rem;
            opacity: 0;
            animation: fadeUp 0.8s cubic-bezier(0.16,1,0.3,1) 0.3s forwards;
        }

        .ring-outer { position: absolute; inset: 0; }
        .ring-outer svg { width: 100%; height: 100%; animation: ringRotate 20s linear infinite; }
        @keyframes ringRotate { to { transform: rotate(360deg); } }

        .ring-track { fill: none; stroke: rgba(212,168,67,0.2); stroke-width: 1; }
        .ring-dash {
            fill: none; stroke: var(--gold); stroke-width: 1.5;
            stroke-dasharray: 6 14; opacity: 0;
            animation: dashFade 0.6s ease 1s forwards;
        }
        @keyframes dashFade { to { opacity: 0.65; } }

        .ring-inner { position: absolute; inset: 13px; }
        .ring-inner svg { width: 100%; height: 100%; animation: ringRotate 10s linear infinite reverse; }
        .ring-inner-track { fill: none; stroke: rgba(0,230,118,0.15); stroke-width: 1; }
        .ring-inner-arc {
            fill: none; stroke: url(#arcGrad); stroke-width: 2.5;
            stroke-linecap: round; stroke-dasharray: 100 170; opacity: 0;
            animation: arcFade 0.8s ease 0.8s forwards;
        }
        @keyframes arcFade { to { opacity: 1; } }

        .logo-gem {
            position: absolute; inset: 24px;
            background: linear-gradient(145deg, #1e4028, #142e1c);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid rgba(0,230,118,0.3);
            box-shadow:
                0 0 0 1px rgba(212,168,67,0.15),
                inset 0 1px 0 rgba(0,255,135,0.2),
                0 6px 24px rgba(0,0,0,0.5),
                0 0 50px rgba(0,200,80,0.15);
            overflow: hidden;
        }
        .logo-gem::before {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(145deg, rgba(0,230,118,0.12) 0%, transparent 55%);
        }
        .logo-gem::after {
            content: ''; position: absolute; top: 8%; left: 18%; right: 18%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
        }
        .logo-letters {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.45rem; font-weight: 700;
            background: linear-gradient(160deg, #f0cc6a 0%, #d4a843 50%, #b08030 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; letter-spacing: 0.05em;
            position: relative; z-index: 1;
        }
        .gem-glow {
            position: absolute; inset: -25px; border-radius: 50%;
            background: radial-gradient(circle, rgba(0,220,100,0.2) 0%, transparent 65%);
            animation: gemGlow 2.8s ease-in-out infinite;
        }
        @keyframes gemGlow {
            0%,100% { opacity: 0.7; transform: scale(0.96); }
            50% { opacity: 1; transform: scale(1.04); }
        }

        /* ── Brand ── */
        .brand {
            opacity: 0;
            animation: fadeUp 0.9s cubic-bezier(0.16,1,0.3,1) 0.6s forwards;
        }
        .brand-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(3rem, 10vw, 4.5rem);
            font-weight: 700; letter-spacing: 0.12em; line-height: 1;
            background: linear-gradient(160deg, #e8f5e9 0%, #a5d6a7 35%, #00e676 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; cursor: pointer;
        }
        .brand-rule {
            display: flex; align-items: center; gap: 12px;
            margin: 1rem auto; width: fit-content;
        }
        .rule-line { width: 50px; height: 1px; background: linear-gradient(90deg, transparent, var(--gold)); }
        .rule-line.r { background: linear-gradient(90deg, var(--gold), transparent); }
        .rule-diamond {
            width: 5px; height: 5px; background: var(--gold);
            transform: rotate(45deg); box-shadow: 0 0 8px var(--gold);
            animation: diamondShimmer 2.5s ease-in-out infinite;
        }
        @keyframes diamondShimmer {
            0%,100% { opacity: 0.8; box-shadow: 0 0 6px var(--gold); }
            50% { opacity: 1; box-shadow: 0 0 16px var(--gold-light); }
        }
        .brand-tagline {
            font-size: 0.6rem; font-weight: 500;
            letter-spacing: 0.38em; text-transform: uppercase;
            color: var(--gold); opacity: 0.8;
        }

        /* ── Separator ── */
        .sep {
            width: 100%; margin: 2.5rem 0;
            display: flex; align-items: center; gap: 16px;
            opacity: 0; animation: fadeUp 0.6s ease 1s forwards;
        }
        .sep-line { flex: 1; height: 1px; background: linear-gradient(90deg, transparent, rgba(0,220,100,0.3), transparent); }
        .sep-icon {
            width: 18px; height: 18px;
            border: 1px solid rgba(0,220,100,0.35);
            transform: rotate(45deg);
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .sep-icon::before {
            content: ''; width: 5px; height: 5px;
            background: var(--g1); opacity: 0.7;
        }

        /* ── Progress ── */
        .progress-area {
            width: 100%; opacity: 0;
            animation: fadeUp 0.7s ease 1.1s forwards;
        }

        .status-line {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 1.25rem;
        }
        .status-left { display: flex; align-items: center; gap: 10px; }
        .status-pip {
            width: 7px; height: 7px; border-radius: 50%;
            background: var(--g1); box-shadow: 0 0 12px var(--g1);
            animation: pipPulse 1.8s ease-in-out infinite;
        }
        @keyframes pipPulse {
            0%,100% { opacity: 1; box-shadow: 0 0 10px var(--g1); }
            50% { opacity: 0.45; box-shadow: 0 0 4px var(--g1); }
        }
        .status-msg {
            font-size: 0.72rem; font-weight: 500;
            letter-spacing: 0.12em; text-transform: uppercase;
            color: var(--text-muted);
        }
        .status-pct {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.7rem; font-weight: 600;
            color: var(--g1); letter-spacing: 0.05em;
            text-shadow: 0 0 20px rgba(0,230,118,0.4);
        }

        /* Bar */
        .bar-wrap {
            position: relative; height: 2px;
            background: rgba(0,220,100,0.1);
            border-radius: 2px;
            margin-bottom: 2rem; overflow: visible;
        }
        .bar-fill {
            position: absolute; top: 0; left: 0; height: 100%; width: 0%;
            background: linear-gradient(90deg, var(--g3), var(--g2), var(--g1));
            border-radius: 2px;
            box-shadow: 0 0 8px rgba(0,230,118,0.5);
        }
        .bar-tip {
            position: absolute; right: -5px; top: 50%; transform: translateY(-50%);
            width: 10px; height: 10px; border-radius: 50%;
            background: var(--g1);
            box-shadow: 0 0 14px var(--g1), 0 0 28px rgba(0,230,118,0.5);
        }
        .bar-fill::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.5) 50%, transparent 100%);
            animation: barShimmer 1.8s ease-in-out infinite;
        }
        @keyframes barShimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(400%); }
        }

        /* Steps */
        .steps { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; }
        .step {
            position: relative; padding: 12px 6px 10px;
            background: rgba(0,180,70,0.05);
            border: 1px solid rgba(0,200,80,0.1);
            border-radius: 4px; text-align: center;
            transition: background 0.4s ease, border-color 0.4s ease;
            overflow: hidden;
        }
        .step-num {
            display: block;
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.1rem; font-weight: 600;
            color: rgba(200,230,210,0.2); line-height: 1; margin-bottom: 4px;
            transition: color 0.4s ease;
        }
        .step-lbl {
            display: block; font-size: 0.58rem; font-weight: 500;
            letter-spacing: 0.14em; text-transform: uppercase;
            color: var(--text-muted); transition: color 0.4s ease;
        }
        .step::before {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(90deg, transparent, rgba(0,230,118,0.1), transparent);
            transform: translateX(-100%);
        }
        .step.active { background: rgba(0,230,118,0.1); border-color: rgba(0,230,118,0.35); }
        .step.active .step-num { color: var(--g1); text-shadow: 0 0 12px rgba(0,230,118,0.5); }
        .step.active .step-lbl { color: rgba(0,230,118,0.8); }
        .step.active::before { animation: stepSweep 0.5s ease forwards; }
        @keyframes stepSweep { to { transform: translateX(200%); } }
        .step.active::after {
            content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, var(--g1), transparent);
            animation: stepGlow 1.5s ease-in-out infinite;
        }
        @keyframes stepGlow { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }
        .step.done { background: rgba(0,200,80,0.07); border-color: rgba(0,200,80,0.2); }
        .step.done .step-num { color: var(--g2); }
        .step.done .step-lbl { color: rgba(0,180,70,0.6); }
        .step.done .step-num::after { content: ' ✓'; font-size: 0.7rem; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 480px) {
            .brand-name { font-size: 2.8rem; }
            .logo-mark { width: 84px; height: 84px; }
            .frame-border { inset: 10px; }
            .orn-tl,.orn-tr,.orn-bl,.orn-br { display: none; }
        }
        @media (max-height: 600px) and (orientation: landscape) {
            .logo-mark { width: 70px; height: 70px; margin-bottom: 1.5rem; }
            .sep { margin: 1.5rem 0; }
        }
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
        }
    </style>
</head>
<body>

<div id="loader">
    <div class="bg-layer">
        <div class="bg-base"></div>
        <div class="bg-conic"></div>
        <div class="bg-rays"></div>
        <div class="bg-lines"></div>
        <div class="bg-vignette"></div>
    </div>

    <div class="frame-border"></div>
    <div class="orn orn-tl"></div>
    <div class="orn orn-tr"></div>
    <div class="orn orn-bl"></div>
    <div class="orn orn-br"></div>

    <div class="content">
        <div class="logo-mark">
            <div class="gem-glow"></div>
            <div class="ring-outer">
                <svg viewBox="0 0 100 100">
                    <defs>
                        <linearGradient id="arcGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#00e676"/>
                            <stop offset="100%" stop-color="#00c853"/>
                        </linearGradient>
                    </defs>
                    <circle class="ring-track" cx="50" cy="50" r="48"/>
                    <circle class="ring-dash" cx="50" cy="50" r="48"/>
                </svg>
            </div>
            <div class="ring-inner">
                <svg viewBox="0 0 74 74">
                    <circle class="ring-inner-track" cx="37" cy="37" r="35"/>
                    <circle class="ring-inner-arc" cx="37" cy="37" r="35"/>
                </svg>
            </div>
            <div class="logo-gem">
                <span class="logo-letters">BN</span>
            </div>
        </div>

        <div class="brand">
            <h1 class="brand-name" id="brandName">BetNex</h1>
            <div class="brand-rule">
                <div class="rule-line"></div>
                <div class="rule-diamond"></div>
                <div class="rule-line r"></div>
            </div>
            <p class="brand-tagline">Premium Gaming Platform</p>
        </div>

        <div class="sep">
            <div class="sep-line"></div>
            <div class="sep-icon"></div>
            <div class="sep-line"></div>
        </div>

        <div class="progress-area">
            <div class="status-line">
                <div class="status-left">
                    <div class="status-pip"></div>
                    <div class="status-msg" id="statusMsg">Initializing</div>
                </div>
                <div class="status-pct" id="pctEl">0%</div>
            </div>

            <div class="steps">
                <div class="step" id="s1"><span class="step-num">01</span><span class="step-lbl">Initialize</span></div>
                <div class="step" id="s2"><span class="step-num">02</span><span class="step-lbl">Connect</span></div>
                <div class="step" id="s3"><span class="step-num">03</span><span class="step-lbl">Load</span></div>
                <div class="step" id="s4"><span class="step-num">04</span><span class="step-lbl">Ready</span></div>
            </div>
        </div>
    </div>
</div>

<div class="iframe-wrap" id="ifWrap">
    <iframe id="gf" src="https://livecasinoapi.betnex.co/wrappedgame?token=87094ac4-1ff9-4c89-a66e-f71242c620bc"
        allowfullscreen
        allow="autoplay; fullscreen; payment; microphone; camera; clipboard-read; clipboard-write"
        loading="eager">
    </iframe>
</div>

<script>
(function () {
    try {
        if (window.self !== window.top) {
            try { if (window.parent !== window.top) block('nested'); }
            catch (e) { block('xorigin'); }
        }
    } catch (e) {}

    function block(t) {
        const m = t === 'nested'
            ? ['🚫','Nested Frame Detected','This content cannot be loaded inside nested iframes.']
            : ['⚠️','Cross-Origin Blocked','Access denied due to cross-origin security restrictions.'];
        document.body.innerHTML = `<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0f1f15;font-family:Montserrat,sans-serif;padding:2rem"><div style="max-width:440px;text-align:center;border:1px solid rgba(212,168,67,0.25);border-radius:4px;padding:3rem 2rem;background:rgba(0,180,70,0.05)"><div style="font-size:3rem;margin-bottom:1rem">${m[0]}</div><div style="font-family:'Cormorant Garamond',serif;font-size:2rem;background:linear-gradient(135deg,#e8f5e9,#00e676);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:1.5rem">BetNex</div><h2 style="color:#e8f5e9;font-size:1.1rem;margin-bottom:.75rem">${m[1]}</h2><p style="color:rgba(200,230,210,0.5);font-size:.85rem;line-height:1.6">${m[2]}</p></div></div>`;
    }

    const loader  = document.getElementById('loader');
    const ifWrap  = document.getElementById('ifWrap');
    const gf      = document.getElementById('gf');
    const barFill = document.getElementById('barFill');
    const pctEl   = document.getElementById('pctEl');
    const msgEl   = document.getElementById('statusMsg');
    const steps   = [1,2,3,4].map(i => document.getElementById('s'+i));

    const MSGS = ['Initializing','Establishing secure connection','Loading assets','Configuring session','Verifying integrity','Launching'];
    let pct = 0, mIdx = 0, sIdx = 0;

    function setBar(v) {
        v = Math.min(100, Math.max(0, v));
        barFill.style.width = v + '%';
        pctEl.textContent = Math.floor(v) + '%';
    }

    function setStep(i) {
        steps.forEach((s, idx) => {
            s.classList.remove('active','done');
            if (idx < i) s.classList.add('done');
            else if (idx === i) s.classList.add('active');
        });
    }

    function allDone() {
        steps.forEach(s => { s.classList.remove('active'); s.classList.add('done'); });
    }

    const pRaf = { id: null, start: 0, target: 0, startTime: 0, dur: 0 };
    function rampTo(target, dur) {
        pRaf.start = pct; pRaf.target = target;
        pRaf.startTime = performance.now(); pRaf.dur = dur;
        cancelAnimationFrame(pRaf.id);
        function tick(now) {
            const t = Math.min(1, (now - pRaf.startTime) / pRaf.dur);
            const e = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
            pct = pRaf.start + (pRaf.target - pRaf.start) * e;
            setBar(pct);
            if (t < 1) pRaf.id = requestAnimationFrame(tick);
        }
        pRaf.id = requestAnimationFrame(tick);
    }

    const mTimer = setInterval(() => {
        if (mIdx < MSGS.length - 1) msgEl.textContent = MSGS[++mIdx];
    }, 900);

    const sTimer = setInterval(() => {
        if (sIdx < steps.length) setStep(sIdx++);
    }, 1050);

    setTimeout(() => rampTo(88, 3800), 400);

    function finish() {
        clearInterval(mTimer); clearInterval(sTimer);
        cancelAnimationFrame(pRaf.id);
        msgEl.textContent = 'Launching';
        allDone(); rampTo(100, 380);
        setTimeout(() => {
            loader.classList.add('out');
            setTimeout(() => ifWrap.classList.add('show'), 600);
        }, 500);
    }

    gf.addEventListener('load', finish);
    setTimeout(() => { if (!loader.classList.contains('out')) finish(); }, 6200);

    setBar(0); setStep(0);
    document.getElementById('brandName').addEventListener('click', () => window.open('https://betnex.co','_blank'));
})();
</script>
